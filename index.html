<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gem Alert Hub</title>

	<!-- Clean modern floating font -->
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

	<style>
		body {
			margin: 0;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;

			background: url("https://media1.tenor.com/m/EsfK9TdObxAAAAAd/gem-alarm-gem-alert.gif") no-repeat center center fixed;
			background-size: cover;

			font-family: "Poppins", sans-serif;
			position: relative;
			overflow: hidden;
		}

		/* dark overlay */
		body::before {
			content: "";
			position: absolute;
			inset: 0;
			background: rgba(0, 0, 0, 0.65);
		}

		.panel {
			width: 650px;
			min-height: 350px;
			padding: 30px;
			border-radius: 18px;

			background: rgba(255, 255, 255, 0.08);
			backdrop-filter: blur(14px);
			-webkit-backdrop-filter: blur(14px);

			border: 1px solid rgba(255, 255, 255, 0.18);
			box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);

			color: white;
			text-align: center;

			position: relative;
			z-index: 1;

			/* floating feel */
			animation: float 6s ease-in-out infinite;
		}

		@keyframes float {
			0% {
				transform: translateY(0px);
			}

			50% {
				transform: translateY(-10px);
			}

			100% {
				transform: translateY(0px);
			}
		}

		h1 {
			margin: 0 0 25px 0;
			font-weight: 400;
			letter-spacing: 3px;
			font-size: 20px;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 15px;
			margin-top: 20px;
		}

		.slot {
			height: 120px;
			border-radius: 14px;

			background: rgba(255, 255, 255, 0.06);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);

			border: 1px solid rgba(255, 255, 255, 0.15);

			display: flex;
			justify-content: center;
			align-items: center;

			color: rgba(255, 255, 255, 0.85);
			font-size: 14px;
			letter-spacing: 1px;

			transition: 0.25s;
			cursor: pointer;
		}

		.slot:hover {
			transform: scale(1.05);
			background: rgba(255, 255, 255, 0.12);
		}
	</style>
</head>

<body>

	<div class="panel">
		<h1>WELCOME TO GEM ALERT</h1>

		<div class="grid">
			<div class="slot">GAME SLOT 1</div>
			<div class="slot">GAME SLOT 2</div>
			<div class="slot">GAME SLOT 3</div>
			<div class="slot">GAME SLOT 4</div>
		</div>
	</div>

</body>

</html>
